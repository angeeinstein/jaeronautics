<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.65; color: #ffffff; background-color: #161718; margin: 0; padding: 0; }
        a { color: #00dfff; text-decoration: none; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #161718; }
        .container { max-width: 640px; margin: 24px auto; background-color: #1f2123; border: 1px solid #34383b; }
        .header { background-color: #000000; padding: 24px 28px; text-align: center; border-bottom: 4px solid #00dfff; }
        .header img { max-width: 220px; height: auto; }
        .content { padding: 32px 34px; }
        .content p { margin: 0 0 16px; color: #ffffff; }
        .action-box { margin: 28px 0; padding: 18px; border: 1px solid #34383b; background-color: #161718; text-align: center; }
        .button { display: inline-block; background-color: #00dfff; color: #081114 !important; padding: 14px 24px; font-weight: 700; }
        .preview { margin: 0 0 18px; color: #aab4bb; }
        .footer { padding: 22px 28px 28px; font-size: 12px; text-align: center; color: #aab4bb; border-top: 1px solid #34383b; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <img src="cid:logo" alt="Joanneum Aeronautics Logo">
            </div>
            <div class="content">
                <p class="preview">{{ preview_text }}</p>
                <p><strong>{{ heading }}</strong></p>
                {% for line in body_lines %}
                    <p>{{ line }}</p>
                {% endfor %}
                <div class="action-box">
                    <a href="{{ action_url }}" class="button">{{ action_label }}</a>
                </div>
                <p>{{ _('If the button does not work, copy and paste this link into your browser:') }}</p>
                <p><a href="{{ action_url }}">{{ action_url }}</a></p>
            </div>
            <div class="footer">
                <p>&copy; {{ now.year }} Joanneum Aeronautics. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
