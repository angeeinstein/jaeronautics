server {
    # Listen on HTTP for the tunnel, or 443 if you terminate SSL here.
    listen 80;
    server_name members.joanneum-aeronautics.stream; # <--- REPLACE WITH YOUR ACTUAL DOMAIN (e.g., myapp.com)

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com https://cdn.jsdelivr.net/npm/; style-src 'self' https://cdn.jsdelivr.net/npm/; frame-src https://js.stripe.com; img-src 'self' data:;" always;

    # --- 1. Serve Static Files Directly ---
    location /static/ {
        # IMPORTANT: This must be the absolute path to your project's static folder
        alias /var/www/aeronautics-members/static/; 
        expires 30d;
    }

    # --- 2. Proxy Dynamic Requests to Gunicorn ---
    location / {
        # Pass necessary headers for Flask and ProxyFix
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The address where Gunicorn is running (e.g., listening on port 8000)
        proxy_pass http://127.0.0.1:8000; 
    }
}
