{% extends "base.html" %}
{% block title %}{{ _('Page Not Found') }}{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card text-center shadow-lg border-0">
                <div class="card-body p-5">
                    <h1 class="display-1 text-primary">404</h1>
                    <h2 class="card-title mb-4">{{ _('Page Not Found') }}</h2>
                    <p class="lead">{{ _("Sorry, we couldn't find the page you were looking for.") }}</p>
                    <div class="mt-5">
                        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">{{ _('Return to Homepage') }}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
